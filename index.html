<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Healing Justice Forum — Black Queer Movements + galck+</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  /* Core Brand Palette */
  --copper: #e3a683; /* Lightened from #d3895c for AA contrast on black */
  --rust: #e6754d;   /* Sharpened for interactive states */
  --black: #000000;
  --off-black: #111111;
  --dark-card: #1a1a1a;
  --white: #ffffff;
  
  /* UI Specifics */
  --text-main: rgba(255,255,255,0.95);
  --text-muted: rgba(255,255,255,0.7); /* Increased from 0.45 for readability */
  --border: rgba(227,166,131,0.3);
  --focus-ring: #42a5f5;
}

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

body{
  font-family:'Inter',sans-serif;
  background:var(--black);
  color:var(--text-main);
  min-height:100vh;
  line-height: 1.5;
}

/* Accessibility: Visible Focus States */
button:focus-visible, input:focus-visible, textarea:focus-visible {
  outline: 2px solid var(--focus-ring);
  outline-offset: 2px;
}

/* LOGIN SCREEN */
#login-screen{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:2rem 1.5rem;
}

.login-wordmark{
  font-family:'Syne',sans-serif;
  font-weight:800;
  font-size: clamp(1.8rem, 8vw, 2.5rem);
  line-height:0.92;
  color:var(--white);
  text-align:center;
  margin-bottom: 0.5rem;
}

.login-wordmark em{color:var(--copper); font-style:normal; display:block;}

.collab-bar{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:0.75rem;
  margin-bottom: 2rem;
  color: var(--text-muted);
  font-size: 0.8rem;
}

.login-card{
  width:100%;
  max-width:400px;
  background:var(--dark-card);
  border:1px solid var(--border);
  border-radius:20px;
  padding:2rem 1.75rem;
}

.lbl{
  font-size:0.75rem;
  font-weight: 600;
  text-transform:uppercase;
  color:var(--text-muted);
  margin-bottom:0.5rem;
  display:block;
}

.login-input{
  width:100%;
  background:rgba(255,255,255,0.08);
  border:1px solid var(--border);
  border-radius:10px;
  padding:1rem;
  color:var(--white);
  font-size:1rem;
  margin-bottom:1.5rem;
}

.login-btn{
  width:100%;
  background:var(--rust);
  border:none;
  border-radius:10px;
  padding:1rem;
  color:var(--white);
  font-family:'Syne',sans-serif;
  font-weight:700;
  text-transform:uppercase;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:0.5rem;
}

/* APP LAYOUT */
#app{display:none; padding-bottom: 6rem;}

.app-header{
  background:var(--black);
  border-bottom:1px solid var(--border);
  padding:1rem;
  display:flex;
  align-items:center;
  justify-content:space-between;
  position:sticky;
  top:0;
  z-index:100;
}

/* CARDS AS BUTTONS */
.quick-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem;
  padding: 1.25rem;
}

.quick-card {
  background: var(--dark-card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 1.25rem;
  cursor: pointer;
  text-align: left;
  color: var(--white);
  transition: transform 0.1s;
}

.quick-card:active { transform: scale(0.97); }

.qc-icon { font-size: 1.5rem; margin-bottom: 0.5rem; display: block; }

.qc-label { 
  font-family: 'Syne', sans-serif; 
  font-weight: 700; 
  display: block; 
}

.qc-sub { 
  font-size: 0.75rem; 
  color: var(--text-muted); 
  margin-top: 0.25rem; 
  display: block;
}

/* NAVIGATION */
.bottom-nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: var(--off-black);
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-around;
  padding: 0.5rem 0;
  z-index: 1000;
}

.nav-item {
  background: none;
  border: none;
  color: var(--text-muted);
  display: flex;
  flex-direction: column;
  align-items: center;
  flex: 1;
  cursor: pointer;
  font-size: 0.7rem;
  text-decoration: none;
}

.nav-item.active { color: var(--copper); }

.nav-icon { font-size: 1.2rem; margin-bottom: 2px; }

/* UTILITY */
.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  border: 0;
}

.page { display: none; padding: 1.25rem; }
.page.active { display: block; }

.page-title {
  font-family: 'Syne', sans-serif;
  font-size: 2rem;
  margin-bottom: 1.5rem;
}

/* FAQ ACCESSIBILITY */
.faq-item {
  background: var(--dark-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  margin-bottom: 0.75rem;
}

.faq-q {
  width: 100%;
  background: none;
  border: none;
  padding: 1rem;
  color: var(--white);
  text-align: left;
  display: flex;
  justify-content: space-between;
  font-weight: 600;
  cursor: pointer;
}
</style>
</head>
<body>

<main>
  <section id="login-screen" aria-labelledby="login-heading">
    <div class="login-wordmark" id="login-heading">BLACK<em>QUEER</em>MOVEMENTS</div>
    <div class="collab-bar">
      <span>in collaboration with galck+</span>
    </div>
    
    <div class="login-card">
      <form onsubmit="event.preventDefault(); tryLogin();">
        <label class="lbl" for="email-in">Email Address</label>
        <input class="login-input" id="email-in" type="email" placeholder="Enter your email" required aria-required="true">
        
        <button type="submit" class="login-btn">
          <span>Send secure login link</span>
        </button>
      </form>
    </div>
  </section>

  <div id="app">
    <header class="app-header">
      <div class="hdr-main" aria-level="1" role="heading">Healing Justice Forum</div>
      <button class="hdr-avatar-btn" onclick="switchPage('profile')" aria-label="View Profile">
        <div class="hdr-avatar" style="width:34px;height:34px;background:var(--rust);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;">AK</div>
      </button>
    </header>

    <section id="page-home" class="page active">
      <h1 class="page-title">Welcome</h1>
      
      <div class="quick-grid">
        <button class="quick-card" onclick="switchPage('agenda')" aria-label="View Agenda">
          <span class="qc-icon" aria-hidden="true">📅</span>
          <span class="qc-label">Agenda</span>
          <span class="qc-sub">3–6 May programme</span>
        </button>
        
        <button class="quick-card" onclick="switchPage('people')" aria-label="View People">
          <span class="qc-icon" aria-hidden="true">👥</span>
          <span class="qc-label">People</span>
          <span class="qc-sub">Attendees & speakers</span>
        </button>

        <button class="quick-card" onclick="switchPage('resources')" aria-label="View Resources">
          <span class="qc-icon" aria-hidden="true">📚</span>
          <span class="qc-label">Resources</span>
          <span class="qc-sub">Materials & directory</span>
        </button>

        <button class="quick-card" onclick="switchPage('faqs')" aria-label="View FAQs">
          <span class="qc-icon" aria-hidden="true">🙋</span>
          <span class="qc-label">FAQs</span>
          <span class="qc-sub">Practical info</span>
        </button>
      </div>
    </section>

    <section id="page-faqs" class="page">
      <h1 class="page-title">FAQs</h1>
      <div class="faq-item">
        <button class="faq-q" onclick="toggleFaq(this)" aria-expanded="false">
          Is the venue safe? <span>▼</span>
        </button>
        <div class="faq-a" style="display:none; padding: 1rem; color: var(--text-muted);">
          Yes. All arrangements are made via queer-informed partners in Nairobi.
        </div>
      </div>
    </section>
  </div>
</main>

<nav class="bottom-nav" id="main-nav" style="display:none;">
  <button class="nav-item active" onclick="switchPage('home')" aria-label="Home Page">
    <span class="nav-icon" aria-hidden="true">🏠</span>
    <span>Home</span>
  </button>
  <button class="nav-item" onclick="switchPage('agenda')" aria-label="Event Agenda">
    <span class="nav-icon" aria-hidden="true">📅</span>
    <span>Agenda</span>
  </button>
  <button class="nav-item" onclick="switchPage('people')" aria-label="Participant List">
    <span class="nav-icon" aria-hidden="true">👥</span>
    <span>People</span>
  </button>
  <button class="nav-item" onclick="switchPage('resources')" aria-label="Resource Library">
    <span class="nav-icon" aria-hidden="true">📚</span>
    <span>Resources</span>
  </button>
  <button class="nav-item" onclick="switchPage('profile')" aria-label="My Profile">
    <span class="nav-icon" aria-hidden="true">👤</span>
    <span>Profile</span>
  </button>
</nav>

<script>
function tryLogin() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('main-nav').style.display = 'flex';
}

function switchPage(pageId) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const target = document.getElementById('page-' + pageId);
  if (target) target.classList.add('active');
  
  // Update nav buttons
  document.querySelectorAll('.nav-item').forEach(btn => {
    btn.classList.remove('active');
    if(btn.getAttribute('aria-label').toLowerCase().includes(pageId)) {
        btn.classList.add('active');
    }
  });
  window.scrollTo(0,0);
}

function toggleFaq(btn) {
  const isExpanded = btn.getAttribute('aria-expanded') === 'true';
  btn.setAttribute('aria-expanded', !isExpanded);
  const answer = btn.nextElementSibling;
  answer.style.display = isExpanded ? 'none' : 'block';
}
</script>

</body>
</html>
